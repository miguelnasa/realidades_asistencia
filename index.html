<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Asistencia - Realidades DISO 1113</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --azul: #0066cc;
      --verde: #0a7b17;
      --rojo: #b30000;
      --gris-claro: #f5f5f5;
      --borde: #dddddd;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: var(--gris-claro);
    }
    header {
      background: #111;
      color: #fff;
      padding: 1rem 1.25rem;
    }
    header h1 { margin: 0; font-size: 1.1rem; }
    header p { margin: 0.25rem 0 0; font-size: 0.85rem; opacity: 0.85; }
    main { padding: 1rem 1.25rem 2.5rem; }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    .controls label {
      font-size: 0.85rem;
      display: block;
      margin-bottom: 0.25rem;
    }
    #fecha {
      font-size: 1rem;
      padding: 0.5rem 0.6rem;
      border-radius: 8px;
      border: 1px solid var(--borde);
      min-width: 180px;
    }
    .btn {
      padding: 0.55rem 0.8rem;
      border-radius: 999px;
      border: none;
      font-size: 0.9rem;
      cursor: pointer;
      color: #fff;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      flex-shrink: 0;
      touch-action: manipulation;
    }
    .btn-guardar { background: var(--azul); }
    .btn-exportar { background: var(--verde); }
    .btn-limpiar { background: var(--rojo); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .tabla-contenedor { max-height: 70vh; overflow-y: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    thead {
      position: sticky;
      top: 0;
      background: #fafafa;
      z-index: 2;
    }
    th, td {
      padding: 0.45rem 0.4rem;
      border-bottom: 1px solid #eee;
      text-align: left;
    }
    th {
      font-weight: 600;
      border-bottom: 1px solid var(--borde);
    }
    tbody tr:nth-child(even) { background: #fbfbfb; }
    .asistencia-opciones {
      display: flex;
      gap: 0.25rem;
    }
    .asistencia-btn {
      flex: 1;
      padding: 0.4rem 0;
      font-size: 0.85rem;
      border-radius: 999px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
      touch-action: manipulation;
    }
    .asistencia-btn.activo {
      color: #fff;
      border-color: transparent;
    }
    .asistencia-btn[data-valor="P"].activo { background: #1e7a34; }
    .asistencia-btn[data-valor="A"].activo { background: #c0392b; }
    .asistencia-btn[data-valor="T"].activo { background: #d68910; }
    .status-label {
      font-size: 0.8rem;
      padding: 0.15rem 0.4rem;
      border-radius: 999px;
      display: inline-block;
      white-space: nowrap;
    }
    .status-P { background: #e6f4ea; color: #1e7a34; }
    .status-A { background: #fde0e0; color: #a02020; }
    .status-T { background: #fff4d6; color: #a6760b; }
    footer {
      font-size: 0.75rem;
      color: #666;
      padding: 0.5rem 1.25rem 1rem;
    }
    @media (max-width: 768px) {
      header, main, footer {
        padding-left: 0.75rem;
        padding-right: 0.75rem;
      }
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
      .btn { justify-content: center; width: 100%; }
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tbody tr {
        background: #fff;
        margin-bottom: 0.6rem;
        border-radius: 10px;
        border: 1px solid #e1e1e1;
        padding: 0.55rem 0.6rem;
      }
      td {
        border: none;
        padding: 0.15rem 0;
      }
      td[data-label="nombre"] {
        font-weight: 600;
        font-size: 0.95rem;
      }
      td[data-label="id"],
      td[data-label="status"],
      td[data-label="semestre"] {
        font-size: 0.8rem;
        color: #555;
      }
      .asistencia-opciones { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <h1>E1: REALIDADES - DISO 1113 (NRC 58668)</h1>
    <p>Lista de asistencia PRIMER SEMESTRE 2026 - 202610</p>
  </header>

  <main>
    <section class="controls">
      <div style="flex:1;min-width:180px;">
        <label for="fecha">Fecha de la clase</label>
        <input type="date" id="fecha" />
      </div>
      <button class="btn btn-guardar" id="btnGuardar">💾 Guardar asistencia</button>
      <button class="btn btn-exportar" id="btnExportar" disabled>📤 Exportar CSV</button>
      <button class="btn btn-limpiar" id="btnLimpiar">🗑️ Limpiar día</button>
      <input type="file" id="archivoLista" accept=".xlsx,.xls" style="display:none" />
      <button class="btn btn-exportar" id="btnCargarArchivo">📎 Cargar lista.xlsx</button>
    </section>

    <section class="tabla-contenedor">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre del alumno</th>
            <th>ID</th>
            <th>Estado inscripción</th>
            <th>Semestre</th>
            <th>Asistencia</th>
            <th>Etiqueta</th>
          </tr>
        </thead>
        <tbody id="tablaCuerpo"></tbody>
      </table>
    </section>
  </main>

  <footer>
    P = Presente, A = Ausente, T = Tarde. Los datos se guardan localmente en este navegador.
  </footer>

  <script>
    let estudiantes = [];
    const STORAGE_KEY = "asistencia_realidades_202610";

    const fechaInput = document.getElementById("fecha");
    const tablaCuerpo = document.getElementById("tablaCuerpo");
    const btnGuardar = document.getElementById("btnGuardar");
    const btnExportar = document.getElementById("btnExportar");
    const btnLimpiar = document.getElementById("btnLimpiar");
    const btnCargarArchivo = document.getElementById("btnCargarArchivo");
    const archivoLista = document.getElementById("archivoLista");

    function hoyISO() {
      const h = new Date();
      const y = h.getFullYear();
      const m = String(h.getMonth() + 1).padStart(2, "0");
      const d = String(h.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function actualizarEstadoExportar() {
      const fecha = fechaInput.value;
      if (!fecha) {
        btnExportar.disabled = true;
        return;
      }
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      btnExportar.disabled = !data[fecha];
    }

    function marcarBotones(index, valor) {
      const grupo = document.querySelectorAll(`.grupo-${index} .asistencia-btn`);
      grupo.forEach(btn => {
        btn.classList.toggle("activo", btn.dataset.valor === valor);
      });
    }

    function actualizarEtiqueta(index, valor) {
      const span = document.getElementById(`status-${index}`);
      span.textContent = "";
      span.className = "status-label";
      if (valor === "P") {
        span.textContent = "Presente";
        span.classList.add("status-P");
      } else if (valor === "A") {
        span.textContent = "Ausente";
        span.classList.add("status-A");
      } else if (valor === "T") {
        span.textContent = "Tarde";
        span.classList.add("status-T");
      }
    }

    function construirTabla() {
      tablaCuerpo.innerHTML = "";
      estudiantes.forEach((est, index) => {
        const tr = document.createElement("tr");
        const tdIdx = document.createElement("td");
        tdIdx.textContent = index + 1;

        const tdNombre = document.createElement("td");
        tdNombre.textContent = est.nombre;
        tdNombre.setAttribute("data-label", "nombre");

        const tdId = document.createElement("td");
        tdId.textContent = "ID: " + est.id;
        tdId.setAttribute("data-label", "id");

        const tdStatus = document.createElement("td");
        tdStatus.textContent = est.status;
        tdStatus.setAttribute("data-label", "status");

        const tdClase = document.createElement("td");
        tdClase.textContent = est.clase;
        tdClase.setAttribute("data-label", "semestre");

        const tdAcciones = document.createElement("td");
        tdAcciones.setAttribute("data-label", "acciones");
        const grupo = document.createElement("div");
        grupo.className = `asistencia-opciones grupo-${index}`;

        ["P", "A", "T"].forEach(valor => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "asistencia-btn";
          btn.dataset.valor = valor;
          btn.textContent = valor;
          btn.addEventListener("click", () => {
            marcarBotones(index, valor);
            actualizarEtiqueta(index, valor);
          });
          grupo.appendChild(btn);
        });
        tdAcciones.appendChild(grupo);

        const tdEtiqueta = document.createElement("td");
        tdEtiqueta.setAttribute("data-label", "etiqueta");
        const span = document.createElement("span");
        span.id = `status-${index}`;
        span.className = "status-label";
        tdEtiqueta.appendChild(span);

        tr.appendChild(tdIdx);
        tr.appendChild(tdNombre);
        tr.appendChild(tdId);
        tr.appendChild(tdStatus);
        tr.appendChild(tdClase);
        tr.appendChild(tdAcciones);
        tr.appendChild(tdEtiqueta);

        tablaCuerpo.appendChild(tr);
      });
    }

    function cargarAsistenciaGuardada() {
      const fecha = fechaInput.value;
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      const asistenciaDia = data[fecha] || {};
      estudiantes.forEach((est, index) => {
        const valor = asistenciaDia[est.id] || "";
        marcarBotones(index, valor);
        actualizarEtiqueta(index, valor);
      });
      actualizarEstadoExportar();
    }

    function guardarAsistencia() {
      const fecha = fechaInput.value;
      if (!fecha) {
        alert("Por favor selecciona una fecha.");
        return;
      }

      const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      const asistenciaDia = {};

      estudiantes.forEach((est, index) => {
        const activo = document.querySelector(`.grupo-${index} .asistencia-btn.activo`);
        asistenciaDia[est.id] = activo ? activo.dataset.valor : "";
      });

      data[fecha] = asistenciaDia;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      alert("Asistencia guardada para " + fecha);
      actualizarEstadoExportar();
    }

    function limpiarAsistenciaDia() {
      const fecha = fechaInput.value;
      if (!fecha) {
        alert("Por favor selecciona una fecha.");
        return;
      }
      if (!confirm("¿Seguro que quieres borrar la asistencia de este día?")) return;

      const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      delete data[fecha];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

      estudiantes.forEach((est, index) => {
        marcarBotones(index, "");
        actualizarEtiqueta(index, "");
      });

      actualizarEstadoExportar();
    }

    function exportarCSV() {
      if (btnExportar.disabled) return;

      const fecha = fechaInput.value;
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      const asistenciaDia = data[fecha] || {};

      const filas = [["Fecha", "Nombre", "ID", "Estado_inscripcion", "Semestre", "Asistencia"]];
      estudiantes.forEach(est => {
        filas.push([
          fecha,
          est.nombre,
          est.id,
          est.status,
          est.clase,
          asistenciaDia[est.id] || ""
        ]);
      });

      const csv = filas.map(fila =>
        fila.map(campo => `"${String(campo ?? "").replace(/"/g, '""')}"`).join(",")
      ).join("\n");

      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `asistencia_realidades_${fecha}.csv`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    async function leerExcel(file) {
      const buffer = await file.arrayBuffer();
      const workbook = XLSX.read(buffer, { type: "array" });
      const sheetName = workbook.SheetNames[0];
      const sheet = workbook.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

      const start = rows.findIndex(r => String(r[0]).trim() === "Nombre del alumno");
      if (start === -1) {
        alert("No se encontró la fila 'Nombre del alumno' en el archivo.");
        return;
      }

      const dataRows = rows.slice(start + 1).filter(r => String(r[0]).trim() !== "");
      estudiantes = dataRows.map(r => ({
        nombre: String(r[0] || "").trim(),
        id: String(r[1] || "").trim(),
        status: String(r[2] || "").replace(/\*\*/g, "").trim(),
        clase: String(r[7] || "").trim()
      }));

      construirTabla();
      cargarAsistenciaGuardada();
    }

    btnCargarArchivo.addEventListener("click", () => archivoLista.click());
    archivoLista.addEventListener("change", e => {
      const file = e.target.files[0];
      if (file) leerExcel(file);
    });

    fechaInput.addEventListener("change", cargarAsistenciaGuardada);
    btnGuardar.addEventListener("click", guardarAsistencia);
    btnExportar.addEventListener("click", exportarCSV);
    btnLimpiar.addEventListener("click", limpiarAsistenciaDia);

    fechaInput.value = hoyISO();
    actualizarEstadoExportar();
  </script>
</body>
</html>
