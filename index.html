<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Asistencia Realidades – Una clase</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }
    header {
      background: #222;
      color: #fff;
      padding: 1rem 1.5rem;
    }
    header h1 {
      margin: 0;
      font-size: 1.4rem;
    }
    header p {
      margin: 0.25rem 0 0;
      font-size: 0.9rem;
      opacity: 0.8;
    }
    main {
      padding: 1rem 1.5rem 2rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1rem;
      align-items: center;
    }
    .controls label {
      font-size: 0.9rem;
      font-weight: 600;
    }
    .controls input[type="date"],
    .controls input[type="text"],
    .controls button {
      padding: 0.35rem 0.6rem;
      font-size: 0.9rem;
    }
    .controls button {
      cursor: pointer;
      border-radius: 4px;
      border: 1px solid #ccc;
      background: #fff;
      transition: background 0.15s ease;
    }
    .controls button:hover {
      background: #eaeaea;
    }

    .tabla-contenedor {
      background: #fff;
      border: 1px solid #ddd;
      overflow-x: auto;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 600px;
      font-size: 0.8rem;
    }
    thead {
      position: sticky;
      top: 0;
      background: #fafafa;
      z-index: 2;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 0.3rem 0.4rem;
      text-align: center;
      white-space: nowrap;
      vertical-align: middle;
    }
    th {
      background: #fafafa;
      font-weight: 600;
    }
    tbody tr:nth-child(even) {
      background: #f9f9f9;
    }

    .col-nombre {
      text-align: left;
      min-width: 260px;
    }
    .col-id {
      text-align: left;
      min-width: 90px;
    }

    .asistencia-celda input[type="checkbox"] {
      transform: scale(1.1);
      cursor: pointer;
    }

    .present {
      background-color: #e0f6e9 !important;
    }
    .ausente {
      background-color: #ffe5e5 !important;
    }

    .small {
      font-size: 0.78rem;
      color: #555;
      margin-top: 0.75rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Asistencia – Realidades (DISO 1113 · NRC 58668)</h1>
    <p>Registro de asistencia para una clase específica</p>
  </header>

  <main>
    <section class="controls">
      <div>
        <label for="fechaClase">Fecha de la clase:</label>
        <input type="date" id="fechaClase" />
      </div>

      <div>
        <label for="filtroNombre">Filtrar por nombre:</label>
        <input type="text" id="filtroNombre" placeholder="Escribe parte del nombre..." />
      </div>

      <div>
        <button id="marcarTodosBtn">Marcar todos presentes</button>
        <button id="limpiarBtn">Limpiar asistencia</button>
      </div>

      <div>
        <button id="exportarCsvBtn">Exportar asistencia (CSV)</button>
      </div>
    </section>

    <section>
      <div class="tabla-contenedor">
        <table id="tablaAsistencia">
          <thead>
            <tr>
              <th class="col-nombre">Nombre del estudiante</th>
              <th class="col-id">ID</th>
              <th>Presente</th>
            </tr>
          </thead>
          <tbody id="cuerpoTabla"></tbody>
        </table>
      </div>

      <div class="small">
        Marca la asistencia para esta fecha y luego exporta el archivo CSV.
      </div>
    </section>
  </main>

  <script>
    // Lista de estudiantes tomada del archivo de lista de clase
    const estudiantes = [
      { nombre: "AGUIAR CUJAR, NICOLE ANDREA", id: "202520130" },
      { nombre: "ANACONA PIRA, ANNA ELISABETH", id: "202512336" },
      { nombre: "CARDOZO GALINDO, ANA MARIA", id: "202610717" },
      { nombre: "CARRERA MORA, KARLA ISABELLA FERNANDA", id: "202525465" },
      { nombre: "CERON GUIZA, ANA SOFIA", id: "202523436" },
      { nombre: "CLAVIJO AFANADOR, MARIA JOSE", id: "202520346" },
      { nombre: "CORREAL PALLARES, ALEGRIA", id: "202525833" },
      { nombre: "CORREDOR AGUIRRE, VALENTINA", id: "202410923" },
      { nombre: "CRUZ SALCEDO, VALERIA", id: "202521335" },
      { nombre: "DE LA CRUZ GALVIS, MARIA DEL PILAR", id: "202526527" },
      { nombre: "DIAZ SANCHEZ, IAN JACOBO", id: "202510866" },
      { nombre: "DIAZGRANADOS URIBE, CRISTINA", id: "202521346" },
      { nombre: "DURAN HERNANDEZ, SAMUEL", id: "202611701" },
      { nombre: "FONSECA BETANCUR, LUCIANA", id: "202520435" },
      { nombre: "GOMEZ HERNANDEZ, SAMUEL", id: "202613745" },
      { nombre: "GUERRERO OCHOA, MARIA JOSE", id: "202521661" },
      { nombre: "GUZMAN MEJIA, ANDREA", id: "202520553" },
      { nombre: "HERNANDEZ PINZON, SARA", id: "202612544" },
      { nombre: "LLANO CASTILLO, ISABELLA", id: "202520639" },
      { nombre: "MEJIA ARENAS, LUCAS", id: "202611365" },
      { nombre: "MELO CALDAS, LAURA DEL PILAR", id: "202414379" },
      { nombre: "MURZI GAMBINO, ANNA ISABEL", id: "202523458" },
      { nombre: "ORDOÑEZ GARZON, MARIA JOSE", id: "202520810" },
      { nombre: "OSORIO BONILLA, MANUELA", id: "202520823" },
      { nombre: "OSPINA CADENA, SERGIO DUVAN", id: "202522338" },
      { nombre: "PELAEZ VERGARA, MANUELA", id: "202522682" },
      { nombre: "RAMIREZ VELEZ, MARIA JULIANA", id: "202420874" },
      { nombre: "ROBLES RIVERO, ROBERT ALIRIO", id: "202614913" },
      { nombre: "RODRIGUEZ BOTELLO, MARIA ALEJANDRA", id: "202112821" },
      { nombre: "ROJAS FRIES, GABRIELA", id: "202420090" },
      { nombre: "SOTO ROMERO, DAVID SANTIAGO", id: "202523725" },
      { nombre: "TINJACA GONZALEZ, CATALINA", id: "202412254" },
      { nombre: "VALDERRAMA BENAVIDES, SOFIA", id: "202521151" },
      { nombre: "VALDES ARAGON, JUAN SEBASTIAN", id: "202316471" },
      { nombre: "VARGAS BOCANEGRA, GABRIELA", id: "202516706" },
      { nombre: "VILLALBA VELANDIA, ISABELLA PANAMBI", id: "202521187" }
    ];

    const filtroNombre = document.getElementById("filtroNombre");
    const cuerpoTabla = document.getElementById("cuerpoTabla");
    const marcarTodosBtn = document.getElementById("marcarTodosBtn");
    const limpiarBtn = document.getElementById("limpiarBtn");
    const exportarCsvBtn = document.getElementById("exportarCsvBtn");
    const fechaClaseInput = document.getElementById("fechaClase");

    // Estructura simple: asistencia[ID] = true/false
    let asistencia = {};
    estudiantes.forEach(est => {
      asistencia[est.id] = false;
    });

    function renderTabla() {
      const filtro = filtroNombre.value.trim().toLowerCase();
      cuerpoTabla.innerHTML = "";

      estudiantes.forEach(est => {
        if (filtro && !est.nombre.toLowerCase().includes(filtro)) return;

        const tr = document.createElement("tr");

        const tdNombre = document.createElement("td");
        tdNombre.textContent = est.nombre;
        tdNombre.classList.add("col-nombre");
        tr.appendChild(tdNombre);

        const tdId = document.createElement("td");
        tdId.textContent = est.id;
        tdId.classList.add("col-id");
        tr.appendChild(tdId);

        const tdAsistencia = document.createElement("td");
        tdAsistencia.classList.add("asistencia-celda");
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = !!asistencia[est.id];

        if (checkbox.checked) {
          tdAsistencia.classList.add("present");
        }

        checkbox.addEventListener("change", () => {
          const presente = checkbox.checked;
          asistencia[est.id] = presente;
          tdAsistencia.classList.toggle("present", presente);
          tdAsistencia.classList.toggle("ausente", !presente);
        });

        tdAsistencia.appendChild(checkbox);
        tr.appendChild(tdAsistencia);

        cuerpoTabla.appendChild(tr);
      });
    }

    function marcarTodosPresentes() {
      estudiantes.forEach(est => {
        asistencia[est.id] = true;
      });
      renderTabla();
    }

    function limpiarAsistencia() {
      estudiantes.forEach(est => {
        asistencia[est.id] = false;
      });
      renderTabla();
    }

    function exportarCSV() {
      const fechaValor = fechaClaseInput.value;
      if (!fechaValor) {
        alert("Por favor selecciona la fecha de la clase antes de exportar.");
        return;
      }

      // Encabezado con fecha en la primera línea
      const encabezadoFecha = `Fecha de la clase: ${fechaValor}`;
      const encabezados = ["Nombre", "ID", "Fecha", "Presente"];

      const filas = [];
      filas.push([encabezadoFecha]); // primera fila solo con la fecha
      filas.push(encabezados);       // segunda fila: encabezados de columnas

      estudiantes.forEach(est => {
        const presente = asistencia[est.id] ? "P" : "A"; // P: presente, A: ausente
        filas.push([est.nombre, est.id, fechaValor, presente]);
      });

      const lineas = filas.map(fila =>
        fila
          .map(valor => {
            const v = String(valor).replace(/"/g, '""');
            return `"${v}"`;
          })
          .join(",")
      );

      const csvContenido = lineas.join("\r\n");
      const blob = new Blob([csvContenido], {
        type: "text/csv;charset=utf-8;"
      });

      const nombreArchivo = `asistencia_realidades_${fechaValor}.csv`;
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = nombreArchivo;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // Eventos
    filtroNombre.addEventListener("input", renderTabla);
    marcarTodosBtn.addEventListener("click", marcarTodosPresentes);
    limpiarBtn.addEventListener("click", limpiarAsistencia);
    exportarCsvBtn.addEventListener("click", exportarCSV);

    // Inicializar
    renderTabla();
  </script>
</body>
</html>
